<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoML Experiment</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js" integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&icon_names=area_chart,build_circle,check_circle,data_check,edit_document,model_training,upload" />
</head>
<body>
    <div class="flex flex-col h-svh justify-between">
        <!-- NAVBAR -->
        <div class="navbar bg-base-100 shadow-sm px-6">
                <label for="my-drawer-3" class="btn drawer-button text-lg lg:hidden mr-4">☰</label>
            <a class="text-xl font-bold">AutoML Tool</a>
        </div>

        <!-- SIDEBAR LAYOUT -->
        <div class="drawer lg:drawer-open h-full">
            <input id="my-drawer-3" type="checkbox" class="drawer-toggle" />
            
            <!-- PAGE CONTENT -->
            <div  class="drawer-content flex flex-col items-center justify-center bg-base-200 p-4">
                <div class="card bg-base-100 h-full w-full p-10 shadow-sm" hx-trigger="load" hx-get="pages/Reporting.html" id="content">asdf</div>
            </div>
            
            <!-- SIDEBAR -->
            <div class="drawer-side h-full" x-data="{page : 'Reporting'}">
                <label for="my-drawer-3" aria-label="close sidebar" class="drawer-overlay"></label>
                <ul class="menu bg-base-200 min-h-full w-70 p-4 gap-2 font-medium" hx-target="#content">
                    <li class="menu-title">Workflow</li>
                    <li class="shadow-sm" :class="page == 'DataImport' ? 'bg-base-300' : 'bg-base-100' " @click="page = 'DataImport'">
                        <a hx-get="pages/DataImport.html"><span class="material-symbols-outlined">upload</span>Data Import</a>
                    </li>
                    <li class="shadow-sm" :class="page == 'DataPrep' ? 'bg-base-300' : 'bg-base-100' " @click="page = 'DataPrep'">
                        <a hx-get="pages/DataPrep.html"><span class="material-symbols-outlined">data_check</span>Data Preparation</a>
                    </li>
                    <li class="shadow-sm" :class="page == 'ModelTrain' ? 'bg-base-300' : 'bg-base-100' " @click="page = 'ModelTrain'">
                        <a hx-get="pages/ModelTrain.html"><span class="material-symbols-outlined">model_training</span>Model Training</a>
                    </li>
                    <li class="shadow-sm" :class="page == 'ModelPerf' ? 'bg-base-300' : 'bg-base-100' " @click="page = 'ModelPerf'">
                        <a hx-get="pages/ModelPerf.html"><span class="material-symbols-outlined">area_chart</span>Model Performance</a>
                    </li>
                    <li class="shadow-sm" :class="page == 'Reporting' ? 'bg-base-300' : 'bg-base-100' " @click="page = 'Reporting'">
                        <a hx-get="pages/Reporting.html"><span class="material-symbols-outlined">edit_document</span>Reporting</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>

</body>
</html>
